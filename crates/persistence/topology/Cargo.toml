[package]
name = "persistence_topology"
version = "0.1.0"
edition.workspace = true
license.workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
persistence_core = { path = "../core" }
serde.workspace = true
serde_json.workspace = true
sqlx.workspace = true
thiserror.workspace = true
time.workspace = true
tokio = { workspace = true, features = ["sync", "rt"] }
uuid.workspace = true

[dev-dependencies]
persistence_core = { path = "../core", features = ["test-fixture"] }
# Self-reference activates test-fixture feature for tests/ integration tests.
persistence_topology = { path = ".", features = ["test-fixture"] }
tempfile.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
uuid.workspace = true

[features]
# Enables `test_support` helpers for crates that depend on persistence_topology
# in their dev-dependencies. Must NOT be enabled in production builds.
test-fixture = ["persistence_core/test-fixture"]

[lints]
workspace = true
