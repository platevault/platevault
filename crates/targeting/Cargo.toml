[package]
name = "targeting"
version = "0.1.0"
edition.workspace = true
license.workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
serde = { workspace = true }
serde_json.workspace = true
sqlx.workspace = true
thiserror.workspace = true
tracing = { workspace = true }
uuid = { version = "1", features = ["serde", "v4", "v5"] }
unicode-normalization.workspace = true
# strsim is already in the lockfile (pulled by other workspace members).
# Fuzzy matching: token-set similarity + Damerau-Levenshtein (R2).
strsim = "0.11"

[features]
# Enables the seeded in-memory test fixture for use in integration tests
# in other crates. Must NOT be enabled in production builds.
test-fixture = []

[dev-dependencies]
tokio = { workspace = true }
persistence_db = { path = "../persistence/db" }

[lints]
workspace = true
