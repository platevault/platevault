name: CI

on:
  push:
    branches: [main, "033-*", "feature/*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-progress runs for the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Rust lint + format ─────────────────────────────────────────────
  rust-lint:
    name: Rust lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (webkit2gtk for desktop_shell compile)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Job 2: Rust tests ─────────────────────────────────────────────────────
  rust-test:
    name: Rust tests (cargo test --workspace)
    runs-on: ubuntu-latest
    needs: rust-lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config

      - name: cargo test --workspace
        run: cargo test --workspace

      # R-3: startup wiring regression (inbox plan listener + log forwarder in run_app)
      - name: R-3 regression · startup wiring
        run: cargo test -p app_core --test startup_wiring_regression

  # ── Job 3: Frontend lint + typecheck ─────────────────────────────────────
  frontend-lint:
    name: Frontend lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # Token guard (check-tokens.sh) is wired into the desktop lint script.
      # Runs: eslint src/ && bash ../../scripts/check-tokens.sh
      # This validates check 4 (R-4: bare --alm-radius) along with checks 1-3.
      - name: Desktop lint (ESLint + token guard incl. R-4 bare --alm-radius check)
        run: pnpm --filter @astro-plan/desktop lint

      - name: TypeScript type-check
        run: pnpm -r --if-present typecheck

  # ── Job 4: Frontend vitest (unit + regression) ───────────────────────────
  frontend-test:
    name: Frontend vitest (unit + regression)
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # Full vitest suite — includes R-2 (MastersList) and R-4 (NamingStructure).
      - name: vitest (all component tests + regressions R-2 and R-4)
        run: pnpm --filter @astro-plan/desktop test

  # ── Job 5: Playwright mocks-UI e2e (R-1 regression) ─────────────────────
  e2e-mocks:
    name: Playwright mocks-UI e2e (R-1 regression)
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers (chromium only)
        run: pnpm --filter @astro-plan/desktop exec playwright install --with-deps chromium

      # R-1: index route redirects to /sessions — not a render crash.
      - name: R-1 regression · index redirect
        run: |
          pnpm --filter @astro-plan/desktop exec playwright test \
            --config apps/desktop/playwright.config.ts \
            tests/e2e/regression_r1_index_redirect.spec.ts
        env:
          VITE_USE_MOCKS: "true"

      # Full mocks-UI e2e suite.
      - name: Playwright mocks-UI full suite
        run: pnpm --filter @astro-plan/desktop test:e2e
        env:
          VITE_USE_MOCKS: "true"
        continue-on-error: true
        # NOTE: non-blocking — some specs need fixture alignment before they are
        # fully stable. Remove continue-on-error once all mocks-UI specs pass.

  # ── Job 6: Real-backend e2e (harness scaffold; all specs skipped) ────────
  #
  # Purpose: prove the Playwright config parses cleanly and the skip stubs
  # remain valid TypeScript. All spec bodies are test.skip() pending the
  # tauri-driver session harness (T006) and real Tauri binary availability.
  #
  # This job is gated behind "if: false" so it does not consume CI minutes,
  # but the job definition is retained so the slot exists in the matrix.
  # Remove the "if: false" gate when a heavier runner with webkit2gtk + a
  # pre-built Tauri binary is available.
  #
  # See: apps/desktop/e2e/README.md — tauri-driver harness status.
  real-backend-scaffold:
    name: Real-backend e2e scaffold (all specs skipped)
    runs-on: ubuntu-latest
    needs: [rust-test, frontend-test]
    if: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Install webkit2gtk, xvfb, tauri-driver
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            xvfb
          cargo install tauri-driver --locked

      - name: Install Playwright webkit browser
        run: pnpm --filter @astro-plan/desktop exec playwright install --with-deps webkit

      - name: Real-backend e2e (all specs expected to be skipped)
        run: pnpm --filter @astro-plan/desktop test:e2e:real
