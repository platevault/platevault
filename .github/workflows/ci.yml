name: CI

# Feature 037 — automated real-stack verification on every change.
# Stage A (this file): Layer-1 real-backend integration + lint + bindings-drift
# gate, REQUIRED on Windows, Linux, and macOS. Fast layer first (FR-012).
# Stage B/C (real-UI E2E) are added with US3; Linux+Windows required, macOS
# best-effort per research D4.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Integration (Layer 1) — ${{ matrix.os }}
    strategy:
      fail-fast: false # report each platform distinctly (FR-011)
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Tauri's desktop_shell crate needs system webview libs to build on Linux.
      - name: Install Tauri Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # --- Fast checks first (FR-012) ---
      - name: Rust format
        run: cargo fmt --all --check

      - name: Clippy (workspace, all targets, deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      # --- Layer 1: real-backend integration + unit tests ---
      - name: Build workspace
        run: cargo build --workspace

      - name: Rust tests (Layer 1 — real SQLite, real migrations)
        run: cargo test --workspace

      - name: Frontend unit tests
        run: pnpm -r --if-present test

      - name: TypeScript typecheck
        run: pnpm -r --if-present typecheck

      # --- Generated contract / binding drift gate (review finding W1) ---
      - name: Generated contract/binding drift
        run: just check-generated

  # Stage B — Layer-2 full-stack E2E. Required on Linux + Windows (research D4).
  # Drives the built app via tauri-driver. Gated behind Stage A (FR-012).
  e2e:
    name: E2E (Layer 2) — ${{ matrix.os }}
    needs: integration
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri + E2E system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev webkit2gtk-driver xvfb

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      # Windows: tauri-driver needs msedgedriver version-matched to installed Edge.
      - name: Setup Edge WebDriver (Windows)
        if: runner.os == 'Windows'
        uses: browser-actions/setup-edge@v1

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright chromium
        run: pnpm --filter @astro-plan/desktop exec playwright install --with-deps chromium

      - name: Build desktop app (debug)
        run: cargo build -p desktop_shell

      # The Playwright config drives the Vite shell with mocks disabled (shell
      # smoke). Real UI->IPC->backend round-trips run via WebdriverIO below.
      - name: Real-backend E2E (Layer 2)
        run: pnpm --filter @astro-plan/desktop test:e2e:real

      # SPIKE (research D3 revision): prove the real Tauri webview is drivable
      # via WebdriverIO + tauri-driver (Playwright cannot drive a W3C WebDriver
      # endpoint). Linux only for now; extend to Windows once green.
      - name: Real-UI WebdriverIO spike (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a pnpm --filter @astro-plan/desktop test:e2e:wdio

  # Stage C — macOS best-effort (research D4): official tauri-driver has no macOS
  # support; real-UI E2E needs a debug-only plugin. Non-merge-blocking.
  e2e-macos:
    name: E2E (Layer 2) — macOS (best-effort)
    needs: integration
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Not-applicable notice (FR-013)
        run: |
          echo "macOS real-UI E2E requires tauri-plugin-webdriver (research D4)."
          echo "Best-effort / non-merge-blocking. macOS Layer-1 runs in the integration job."
