name: CI

# Feature 037 — automated real-stack verification on every change.
# - integration: Layer-1 real-backend integration + lint + bindings-drift gate,
#   REQUIRED on Windows, Linux, and macOS (FR-012).
# - ui-e2e: fast mock-mode Playwright UI regression.
# Real UI->IPC->backend E2E (thirtyfour + cargo-nextest) lives in e2e.yml and
# runs on ALL three OS via tauri-plugin-webdriver (Choochmeque) embedded in
# desktop_shell under the `e2e` feature flag — no external per-OS WebDriver
# binary required. WebdriverIO has been retired.
#
# Path-aware gating (see the `changes` job): work that a change cannot affect is
# skipped. Full-suite triggers (workflows, Cargo/lockfiles, package manifests,
# justfile, scripts) force everything to run via `force_full`.
#
# A job that would have NOTHING meaningful left to do must be skipped at JOB
# level, never step-by-step. A job whose every step is skipped still concludes
# `success`, making "this passed" and "this never ran" indistinguishable in the
# UI, the checks API and to automated pollers. A job skipped by a job-level
# `if:` concludes `skipped` — a distinct conclusion that still lets a docs-only
# PR merge. Step-level `if:` is legitimate only where the job as a whole still
# runs real work (the `integration` matrix interleaves a Rust lane and a
# frontend lane; its job-level gate fires only when BOTH lanes are idle).

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Incremental artifacts are not reusable across CI runs and only bloat the cache.
env:
  CARGO_INCREMENTAL: 0
  # Debuginfo is 53% of every compiled artifact and the runners have been
  # exhausting disk on it: `target/debug` reaches 1.1 GB, the 11 e2e journey
  # binaries total 356 MB (~32 MB each, 15.3 MB after `strip --strip-debug`),
  # and that archive is then downloaded by six shard jobs. PR #1216's ubuntu
  # leg died with `rustc-LLVM ERROR: IO failure on output stream: No space left
  # on device`, which reads as a code failure and costs real triage time.
  #
  # `line-tables-only` keeps file/line information in panic backtraces -- the
  # part that actually matters when a test or journey fails -- while dropping
  # the type and variable debuginfo that dominates the size. A full strip would
  # be smaller still but loses backtrace line numbers, a bad trade for a test
  # suite. Set here rather than as a `[profile.*]` in Cargo.toml so local
  # developer builds keep full debuginfo. See issue #1250.
  CARGO_PROFILE_DEV_DEBUG: line-tables-only
  CARGO_PROFILE_TEST_DEBUG: line-tables-only

jobs:
  # Cheap change-detection gate (dorny/paths-filter). Downstream jobs read its
  # outputs to decide which heavy steps to run. Outputs:
  #   rust      — run Rust steps (a *.rs / crate / src-tauri / tests change, OR
  #               any force_full trigger).
  #   frontend  — run frontend steps (a TS/TSX/CSS / desktop-src / packages
  #               change, OR any force_full trigger).
  #   docs_only — informational: the change touched only docs and nothing that
  #               drives Rust or frontend (fast-pass path).
  #   scripts   — a scripts/** change (drives the DB-boundary ratchet).
  #   all_files — CSV of every changed path, consumed by the changed-crate
  #               scoping step for `cargo test -p`.
  changes:
    name: Detect changes (CI)
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.decide.outputs.rust }}
      frontend: ${{ steps.decide.outputs.frontend }}
      frontend_full: ${{ steps.decide.outputs.frontend_full }}
      docs_only: ${{ steps.decide.outputs.docs_only }}
      scripts: ${{ steps.filter.outputs.scripts }}
      all_files: ${{ steps.filter.outputs.all_files }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          list-files: csv
          filters: |
            all:
              - '**'
            # force_full, split per lane: a dependency-graph change forces only
            # the lane whose graph moved. A Cargo.lock bump does not invalidate
            # the frontend suite, and a pnpm-lock.yaml bump does not invalidate
            # the Rust suite. Shared drivers still force BOTH, because they can
            # change how either lane executes.
            #
            # Deliberately NOT '.github/workflows/**': editing e2e.yml or
            # release-please.yml cannot change how ci.yml runs its lanes, and
            # treating every workflow edit as a full-suite trigger is what made
            # a Rust-only refactor (#1169) run the entire frontend suite.
            force_full_shared:
              - 'justfile'
              - 'scripts/**'
              - '.github/workflows/ci.yml'
            force_full_rust:
              - '**/Cargo.toml'
              - 'Cargo.lock'
            force_full_frontend:
              - '**/package.json'
              - 'pnpm-lock.yaml'
            # Frontend inputs the vitest module graph cannot see, so `vitest
            # related` would silently skip tests that depend on them: runner
            # config, the setup file, global styles/tokens, the i18n
            # catalogues, and the shared packages consumed via bindings.
            frontend_full:
              - 'apps/desktop/vitest.config.ts'
              - 'apps/desktop/vite.config.ts'
              - 'apps/desktop/vitest.setup.ts'
              - 'apps/desktop/tsconfig*.json'
              - 'apps/desktop/src/styles/**'
              - 'apps/desktop/messages/**'
              - 'packages/**'
            rust:
              - 'crates/**'
              - 'apps/desktop/src-tauri/**'
              - 'tests/**'
              - '**/*.rs'
            frontend:
              - 'apps/desktop/src/**'
              - 'apps/desktop/public/**'
              - 'apps/desktop/index.html'
              - 'packages/**'
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.css'
            scripts:
              - 'scripts/**'
            docs:
              - 'docs/**'
              - 'e2e-agentic-test/**'
              - 'specs/**'
              - '**/*.md'
              - '.apm/**'
              - 'PRODUCT.md'
              - 'CLAUDE.md'
              - 'AGENTS.md'
      - id: decide
        shell: bash
        run: |
          shared="${{ steps.filter.outputs.force_full_shared }}"
          rust=false
          frontend=false
          if [ "$shared" = "true" ] || [ "${{ steps.filter.outputs.force_full_rust }}" = "true" ] || [ "${{ steps.filter.outputs.rust }}" = "true" ]; then
            rust=true
          fi
          if [ "$shared" = "true" ] || [ "${{ steps.filter.outputs.force_full_frontend }}" = "true" ] || [ "${{ steps.filter.outputs.frontend }}" = "true" ]; then
            frontend=true
          fi
          # frontend_full: run every vitest spec rather than the `related`
          # subset. Any shared driver or lockfile change, or a frontend input
          # invisible to the module graph, disables scoping.
          frontend_full=false
          if [ "$shared" = "true" ] \
            || [ "${{ steps.filter.outputs.force_full_frontend }}" = "true" ] \
            || [ "${{ steps.filter.outputs.frontend_full }}" = "true" ]; then
            frontend_full=true
          fi
          # docs_only: at least one doc changed and nothing drives Rust/frontend.
          docs_only=false
          if [ "$rust" = "false" ] && [ "$frontend" = "false" ] && [ "${{ steps.filter.outputs.docs }}" = "true" ]; then
            docs_only=true
          fi
          {
            echo "rust=$rust"
            echo "frontend=$frontend"
            echo "frontend_full=$frontend_full"
            echo "docs_only=$docs_only"
          } >> "$GITHUB_OUTPUT"
          echo "changes: rust=$rust frontend=$frontend frontend_full=$frontend_full docs_only=$docs_only scripts=${{ steps.filter.outputs.scripts }}"

  # Two lanes share this matrix (Rust and frontend), each with its own step-level
  # gate, so it is NOT split into two jobs: whenever either lane is active every
  # OS leg still runs real work — `Rust tests` + `Generated contract/binding
  # drift` are OS-agnostic under the Rust lane, as are the frontend lint / unit
  # test / typecheck steps under the frontend lane. The job-level gate below
  # therefore fires only when BOTH lanes are idle, which is exactly the case
  # where the job had nothing to do and must not report `success`.
  integration:
    name: Unit + integration (L1+L2) — ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.frontend == 'true'
    strategy:
      fail-fast: false # report each platform distinctly (FR-011)
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Tauri's desktop_shell crate needs system webview libs to build on Linux.
      - name: Install Tauri Linux system deps
        if: runner.os == 'Linux' && needs.changes.outputs.rust == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable
        if: needs.changes.outputs.rust == 'true'
        with:
          components: rustfmt, clippy

      # shared-key lets jobs on the same OS reuse one warm cache. cache-on-failure
      # is intentionally left at its default (false): a cancelled or killed job
      # (e.g. from this workflow's cancel-in-progress concurrency group) can leave
      # a torn/partial target/ dir, and saving that on failure/cancellation poisons
      # the shared cache for every subsequent PR that restores it. On Windows this
      # previously manifested as a permanently-cached, half-linked
      # `commands-*.exe` failing every run with STATUS_ENTRYPOINT_NOT_FOUND
      # (0xc0000139) until the cache key below was bumped to escape it.
      # If this key is ever bumped again to escape a similarly poisoned cache,
      # also purge the stale `v0-rust-rust-windows-latest-*` entries via
      # `gh cache list` / `gh cache delete` so open PRs stop restoring them.
      - uses: Swatinem/rust-cache@v2
        if: needs.changes.outputs.rust == 'true'
        with:
          shared-key: "rust-${{ matrix.os }}-v2"

      - uses: pnpm/action-setup@v4
        if: needs.changes.outputs.frontend == 'true'
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        if: needs.changes.outputs.frontend == 'true'
        with:
          node-version: 20
          cache: pnpm

      # `just` drives the DB-boundary ratchet and the generated-drift gate, both
      # of which run under the Rust lane.
      - uses: taiki-e/install-action@v2
        if: needs.changes.outputs.rust == 'true'
        with:
          tool: just,nextest

      - name: Install JS deps
        if: needs.changes.outputs.frontend == 'true'
        run: pnpm install --frozen-lockfile

      # Vite's dependency-optimizer output. Restored AFTER `pnpm install`
      # because it lives inside `node_modules/`, which the install recreates.
      #
      # Without it every run pays a cold optimize+transform for all ~200 test
      # files at once. That storm is not merely slow: vitest's `testTimeout`
      # clock starts when a test is scheduled, not when it gets a worker, so
      # a cold run charges queue time against unrelated tests and fails them
      # on timeout (observed locally: 21s transform vs the 15s timeout, two
      # suites red; both pass in isolation and pass warm).
      #
      # Vite validates this cache against its own hash of the lockfile and
      # config and re-optimizes on mismatch, so a stale restore degrades to
      # today's cold behaviour rather than serving wrong modules. The key
      # mirrors those same inputs so the common case is a clean hit.
      - name: Cache Vite transform/deps output
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/cache@v4
        with:
          path: apps/desktop/node_modules/.vite
          key: vite-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'apps/desktop/vite.config.ts', 'apps/desktop/vitest.config.ts') }}
          restore-keys: |
            vite-${{ runner.os }}-

      # --- Fast checks first (FR-012) ---
      # Frontend lint gate: Biome (format check + syntactic rules) first, then
      # the slimmed ESLint layer Biome cannot replicate — the spec-046
      # `alm/no-user-string` i18n rule (fails the build on any NEW hardcoded
      # user-facing string, SC-001/SC-002, gated through
      # scripts/check-eslint-baseline.mjs + eslint-alm-baseline.txt so
      # pre-existing violations drain via the refactor sweep instead of
      # blocking every PR), type-aware typescript-eslint, react-hooks,
      # jsx-a11y, and the inline-style ban — then the design-token guard
      # (check-tokens.sh) and the i18n catalog lint
      # (check-i18n-catalog.mjs: raw `{code}` interpolation + duplicate
      # catalog values, same baseline-drain pattern).
      - name: Frontend lint (Biome + ESLint gates + tokens)
        if: needs.changes.outputs.frontend == 'true'
        run: pnpm --filter @astro-plan/desktop run lint

      # `tests/` is outside the pnpm workspace globs (`apps/*`, `packages/*`),
      # so `pnpm -r lint` never reaches it and `apps/desktop/biome.json` scopes
      # itself to `src/**`. Without this step the E2E suite is unlinted and
      # unformatted. Runs off the root biome.json, which is scoped to `tests/**`
      # so it cannot shadow the nested desktop config.
      - name: Test-suite lint (Biome over tests/)
        if: needs.changes.outputs.frontend == 'true'
        run: pnpm run lint:tests

      # Formatting is OS-agnostic; running it on all 3 legs is pure redundancy.
      # `cargo fmt` only walks `mod` declarations, so it never reaches
      # bootstrap/specta.rs, which is `include!`d rather than `mod`-declared
      # (see that file's header). Check it explicitly so it cannot drift.
      - name: Rust format
        if: runner.os == 'Linux' && needs.changes.outputs.rust == 'true'
        run: |
          cargo fmt --all --check
          rustfmt --edition 2021 --check apps/desktop/src-tauri/src/bootstrap/specta.rs

      # Self-test the changed-crate scoping helper's mapping/closure logic
      # (runs once, on Linux, under the Rust lane).
      - name: Affected-crates helper self-test
        if: runner.os == 'Linux' && needs.changes.outputs.rust == 'true'
        run: bash scripts/ci-affected-crates.sh --self-test

      # DB boundary ratchet (parked in PR #384, wired in here): fails if raw
      # sqlx query/exec sites outside crates/persistence/db exceed the
      # checked-in baseline. Pure grep, no compile — runs once on Linux only
      # per the design doc's guidance (docs/development/persistence-layer-hardening.md).
      # Gated to run whenever Rust or scripts change (skipped on docs-only).
      - name: DB boundary ratchet
        if: runner.os == 'Linux' && (needs.changes.outputs.rust == 'true' || needs.changes.outputs.scripts == 'true')
        run: just db-boundary

      # Compilation warnings/lints are OS-agnostic; running clippy on all 3 legs
      # is pure redundancy — the nextest step below builds the workspace anyway.
      - name: Clippy (workspace, all targets, deny warnings)
        if: runner.os == 'Linux' && needs.changes.outputs.rust == 'true'
        run: cargo clippy --workspace --all-targets -- -D warnings

      # The default workspace clippy above never enables `dev-tools`, so the
      # developer-mode surface (apps/desktop/src-tauri/src/commands/dev.rs)
      # was linted by nobody and four lints rotted unseen (#1165). Release
      # binaries still omit `dev-tools` (see .claude/rules/21-astro-monorepo.md)
      # — this step only adds lint coverage for the daily developer build, it
      # does not touch the release build path. Same OS-agnostic reasoning as
      # the step above, so Linux-only here too.
      - name: Clippy (desktop_shell, dev-tools feature, deny warnings)
        if: runner.os == 'Linux' && needs.changes.outputs.rust == 'true'
        run: cargo clippy -p desktop_shell --features dev-tools --all-targets -- -D warnings

      # --- L1 (isolated units) + L2 (real-backend integration) ---
      # No standalone `cargo build --workspace` step: clippy --all-targets
      # (above, Linux) and nextest (below, every OS) each already build every
      # target they need, so a dedicated build step only duplicated work.
      # Clippy is Linux-only above, so Windows loses its only all-targets
      # compile check of non-test code ([[bin]]s, examples) — nextest only
      # builds through the cfg(test) harness. This repo has real history of
      # Windows-only bin-vs-test-binary divergence (tauri-build manifest
      # embed regression -> 0xc0000139), so restore cheap bin-target coverage
      # on Windows specifically. macOS stays descoped (no comparable history).
      - name: Windows workspace check (all targets)
        if: runner.os == 'Windows' && needs.changes.outputs.rust == 'true'
        run: cargo check --workspace --all-targets

      # Scope `cargo test` to the changed workspace members plus their
      # reverse-dependency closure (see scripts/ci-affected-crates.sh). Any
      # force_full trigger (Cargo.lock, workflows, …) or a rust-relevant file
      # outside every member yields the full-workspace fallback. Build/clippy
      # stay workspace-wide — conservative: when in doubt, run more.
      - name: Rust tests (L1+L2 — real SQLite, real migrations)
        if: needs.changes.outputs.rust == 'true'
        shell: bash
        # CHANGED_FILES is passed via env (never interpolated into the script
        # body) so an attacker-crafted filename cannot inject shell commands.
        # nextest --profile ci: fail-fast off (report every failing leg), JUnit
        # output, and retries=2 scoped to the real-SQLite integration binaries
        # only (see .config/nextest.toml). Unit tests are not retried.
        env:
          CHANGED_FILES: ${{ needs.changes.outputs.all_files }}
        run: |
          args=$(printf '%s' "$CHANGED_FILES" | tr ',' '\n' | bash scripts/ci-affected-crates.sh)
          if [ "$(printf '%s' "$args" | tr -d '[:space:]')" = "ALL" ] || [ -z "$(printf '%s' "$args" | tr -d '[:space:]')" ]; then
            echo "Running full workspace test suite."
            cargo nextest run --workspace --profile ci
          else
            echo "Running scoped tests for: $args"
            # --no-tests=pass: a scoped crate set can legitimately contain
            # zero runnable tests (e.g. an e2e_tests-only change — all its
            # tests are #[ignore]d for the Layer-2 e2e.yml job), and nextest
            # otherwise exits 4 ("no tests to run", run 28751553778).
            cargo nextest run --profile ci --no-tests=pass $args
          fi

      # nextest does not run doctests; keep them in a dedicated step. Doctest
      # output is OS-agnostic, so Linux-only avoids running it 3x.
      - name: Rust doctests
        if: runner.os == 'Linux' && needs.changes.outputs.rust == 'true'
        run: cargo test --workspace --doc

      # Scope vitest to the specs that transitively import the changed modules.
      # `vitest related` resolves the real import graph, which is strictly more
      # accurate than a directory convention and needs no maintenance as files
      # move. Inputs the graph cannot see (runner config, setup file, global
      # styles, i18n catalogues, shared packages) set frontend_full and fall
      # back to the whole suite — see the `frontend_full` filter above.
      #
      # CHANGED_FILES is passed via env, never interpolated into the script
      # body, so a crafted filename cannot inject shell commands (same rule as
      # the Rust scoping step).
      - name: Frontend unit tests
        if: needs.changes.outputs.frontend == 'true'
        shell: bash
        env:
          CHANGED_FILES: ${{ needs.changes.outputs.all_files }}
          FRONTEND_FULL: ${{ needs.changes.outputs.frontend_full }}
        run: |
          set -euo pipefail
          # Non-desktop workspaces run plain node scripts; they are cheap and
          # have no vitest graph, so they always run in full.
          #
          # The `!.` filter is load-bearing: `pnpm -r` excludes the workspace
          # root by default, but adding ANY --filter re-includes it. The root's
          # `test` script is `cargo test --workspace && pnpm -r --if-present
          # test`, so omitting `!.` makes this step run the entire Rust suite
          # inside a step named "Frontend unit tests" — which is how it was
          # first caught, as an app_core_calibration failure on macOS.
          pnpm --filter='!./apps/desktop' --filter='!.' -r --if-present test

          cd apps/desktop

          # `apps/desktop` declares `"pretest": "pnpm i18n:compile"`, and
          # `src/paraglide/` is gitignored, so the message catalogue only exists
          # once that runs. Invoking vitest through `pnpm exec` skips npm
          # lifecycle hooks, so pretest never fires and 145 of 199 spec files
          # fail on a missing `@/paraglide/messages`. Compile explicitly.
          pnpm i18n:compile

          if [ "$FRONTEND_FULL" = "true" ]; then
            echo "frontend_full=true -> running the complete vitest suite."
            pnpm exec vitest run
            exit 0
          fi

          # Changed files under this package, rebased to package-relative paths
          # and filtered to ones that exist (a deleted file has no dependents to
          # resolve and makes `vitest related` error).
          #
          # Read with `while read`, NOT `mapfile`: the macOS runner's /bin/bash
          # is 3.2 (Apple ships no GPLv3 bash), where `mapfile` does not exist.
          # It exits 127 and takes the whole step with it, so the frontend suite
          # never runs on macOS at all. The existence filter is folded into the
          # same loop rather than kept as a second pass over an intermediate
          # array — one loop cannot disagree with itself about which files it
          # collected.
          existing=()
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            [ -f "$f" ] && existing+=("$f")
          done < <(
            printf '%s' "$CHANGED_FILES" | tr ',' '\n' \
              | sed -n 's#^apps/desktop/##p' \
              | grep -E '^src/.*\.(ts|tsx)$' || true
          )

          if [ ${#existing[@]} -eq 0 ]; then
            echo "No existing apps/desktop/src TS files changed -> full suite (conservative)."
            pnpm exec vitest run
            exit 0
          fi

          echo "Running specs related to ${#existing[@]} changed file(s):"
          printf '  %s\n' "${existing[@]}"

          # `vitest related` prints "No test files found, exiting with code 0"
          # when a changed module has no dependent spec — a green result having
          # run nothing, which makes "the suite passed" and "the suite never
          # ran" indistinguishable. Treat that as unscopable and fall back to
          # the full suite rather than reporting a vacuous pass.
          set +e
          out=$(pnpm exec vitest related --run "${existing[@]}" 2>&1)
          rc=$?
          set -e
          printf '%s\n' "$out"

          if printf '%s' "$out" | grep -q 'No test files found'; then
            echo "::notice::vitest related selected no specs; running the full suite instead."
            pnpm exec vitest run
          elif [ "$rc" -ne 0 ]; then
            exit "$rc"
          fi

      - name: TypeScript typecheck
        if: needs.changes.outputs.frontend == 'true'
        run: pnpm -r --if-present typecheck

      # --- Generated contract / binding drift gate (review finding W1) ---
      # Regenerates Rust->TS bindings and contracts and fails on drift. Compiles
      # Rust, so it belongs to the Rust lane.
      - name: Generated contract/binding drift
        if: needs.changes.outputs.rust == 'true'
        run: just check-generated

  # Mock-mode UI regression: fast Playwright run (Vite + chromium, mocks on, no
  # backend/Tauri build). The real UI->IPC->backend journeys run in the dedicated
  # WebdriverIO + tauri-driver workflow (e2e.yml). Not gated on `integration` so
  # UI regressions surface even when the Rust workspace gate is unrelatedly red.
  # Single-lane job: every step is frontend work, so the whole job is gated on
  # the frontend lane and a change that cannot affect the frontend skips it
  # outright rather than reporting a green check for an empty run.
  ui-e2e:
    name: UI mock-mode (Playwright)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install JS deps
        run: pnpm install --frozen-lockfile
      - name: Install Playwright chromium
        run: pnpm --filter @astro-plan/desktop exec playwright install --with-deps chromium
      - name: Mock-mode UI tests
        run: pnpm --filter @astro-plan/desktop test:e2e
