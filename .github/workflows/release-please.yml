name: Release Please

# Maintains a release PR from Conventional Commits (feat/fix/...), updates
# CHANGELOG.md, bumps the desktop app version in three synced files
# (apps/desktop/src-tauri/tauri.conf.json, apps/desktop/package.json,
# apps/desktop/src-tauri/Cargo.toml), and tags a plain `v{version}` release on
# merge. Runs ONLY on main: releases are cut from main, never from the
# redesign integration branch. The first release PR appears once this config
# lands on main (via #349) and a subsequent feat/fix is pushed.
#
# The release PR is verified by release-gate.yml, which posts the single
# "Release Gate / verdict" check the shepherd reads before merging.
#
# Once release-please tags+publishes a release (release_created == 'true'),
# the `build` job (spec 051 US10 / T060) builds the Tauri desktop app on the
# Windows/macOS/Linux matrix, signs the bundles + updater artifact with
# tauri-apps/tauri-action (minisign, via the TAURI_SIGNING_PRIVATE_KEY[_PASSWORD]
# repo secrets), and uploads them — plus the generated `latest.json` updater
# manifest — to the release that release-please just created. This is what
# makes https://github.com/nightwatch-astro/alm/releases/latest/download/latest.json
# resolve for `tauri-plugin-updater`. The embedded public key that verifies
# these signatures lives in apps/desktop/src-tauri/tauri.conf.json and is
# owned by a separate US10 lane, not this workflow.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      release_body: ${{ steps.release.outputs.body }}
    steps:
      # Mint a short-lived GitHub App installation token from the shared org
      # release app (contents:write + pull_requests:write). This is the
      # cross-org-correct identity: unlike a personal PAT it needs no org
      # approval and no lifetime management, and unlike the default GITHUB_TOKEN
      # its releases/tags DO trigger downstream workflows (release-gate on
      # `push: tags`) and its PR checks are not held as `action_required`.
      # Credentials are provisioned org-wide (visibility=all):
      #   RELEASE_APP_CLIENT_ID  — Actions variable
      #   RELEASE_APP_PRIVATE_KEY — Actions secret
      - name: Mint release-please app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    name: Build & sign (${{ matrix.os }})
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      fail-fast: false # report each platform distinctly, same as CI's integration matrix
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Tauri's desktop_shell crate needs system webview libs to build AND
      # bundle (deb/rpm/AppImage) on Linux. patchelf is additionally required
      # for AppImage bundling, which ci.yml's plain `cargo build` never
      # exercises.
      - name: Install Tauri Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-${{ matrix.os }}"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # tauri-action auto-detects the package manager by checking for a
      # lockfile inside `projectPath` — apps/desktop has no pnpm-lock.yaml of
      # its own (it lives at the workspace root), so auto-detection would fall
      # through to `npm run tauri`. `tauriScript: pnpm tauri` pins it to the
      # same invocation the justfile already uses for `tauri dev`.
      #
      # includeUpdaterJson + updaterJsonPreferNsis mirror astro-up's proven
      # release.yml (~/dev/astro-up/.github/workflows/release.yml): the
      # Windows updater artifact is the NSIS bundle, and a signed `latest.json`
      # is generated and uploaded alongside the platform bundles.
      #
      # releaseDraft: false — release-please (the `release-please` job above)
      # already published a real (non-draft) GitHub Release for this tag, so
      # this step finds that release by tag and uploads bundles/signatures to
      # it directly, rather than astro-up's separate draft-then-publish dance
      # (that dance exists there because its release-please step creates the
      # release explicitly as part of the same job; here it's already public
      # by the time this job runs, and release-gate.yml already hard-gates the
      # release PR pre-merge).
      - name: Build, sign, and upload Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          tagName: ${{ needs.release-please.outputs.tag_name }}
          releaseName: ${{ needs.release-please.outputs.tag_name }}
          releaseBody: ${{ needs.release-please.outputs.release_body }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

      # Windows bundles above carry only the minisign updater signature, not an
      # Authenticode signature — Windows SmartScreen still shows "Unknown
      # Publisher" for the NSIS .exe and .msi. Collect them here so the
      # (currently disabled) sign-windows job below can submit them to
      # SignPath without needing its own build/checkout of the Tauri app.
      # Gated on the same var as sign-windows: with ENABLE_WINDOWS_SIGNING
      # unset, this step is skipped and the build job's effects (including
      # the release published by tauri-action above) are unchanged.
      - name: Collect unsigned Windows bundles
        if: ${{ runner.os == 'Windows' && vars.ENABLE_WINDOWS_SIGNING == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-unsigned-bundles
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 1

  # Authenticode-signs the Windows NSIS/MSI bundles via the SignPath
  # Foundation free OSS code-signing program (see
  # docs/development/windows-code-signing.md for the research, eligibility
  # verdict, and application checklist). Disabled by default: SignPath
  # Foundation approval + the SIGNPATH_* secrets/vars below are required
  # before this can run, so it is gated on a repo Actions variable that is
  # unset until the application is approved and wired up. With the variable
  # unset, this job is skipped entirely and the release published by `build`
  # above is unchanged.
  sign-windows:
    name: Sign Windows bundles (SignPath)
    needs: [release-please, build]
    if: ${{ needs.release-please.outputs.release_created == 'true' && vars.ENABLE_WINDOWS_SIGNING == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download unsigned Windows bundles
        uses: actions/download-artifact@v4
        with:
          name: windows-unsigned-bundles
          path: unsigned

      # Re-upload as a fresh workflow artifact: the SignPath action takes a
      # github-artifact-id from actions/upload-artifact in *this* job, it
      # cannot reference an artifact produced by a different job/id directly.
      - name: Re-upload bundles for SignPath submission
        id: upload-for-signing
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundles-for-signing
          path: unsigned/**
          retention-days: 1

      # project-slug/signing-policy-slug/artifact-configuration-slug are
      # created in the SignPath dashboard once the Foundation application is
      # approved (see the doc above) and are not secrets — set them as repo
      # Actions variables alongside ENABLE_WINDOWS_SIGNING.
      - name: Submit signing request to SignPath
        id: signpath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-for-signing.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      # tauri-action already uploaded unsigned copies of these files to the
      # release in the `build` job; --clobber replaces them in place with the
      # Authenticode-signed versions.
      - name: Upload signed bundles to the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            signed/*.exe signed/*.msi \
            --repo "${{ github.repository }}" \
            --clobber
