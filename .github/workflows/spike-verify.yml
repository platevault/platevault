# TEMPORARY — verifies the WebdriverIO + tauri-driver spike independent of the
# main CI's Stage A gate (main is chronically red, which would otherwise skip
# the gated Stage B spike step). Remove this file once the spike is proven.
name: Spike Verify (temporary)

on:
  push:
    branches: [037-us3-e2e-journeys]
  workflow_dispatch:

jobs:
  spike:
    name: Real-UI WebdriverIO spike (decoupled)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri + E2E system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev webkit2gtk-driver xvfb

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # The binary loads its frontend from the Tauri devUrl (:5173); the spike
      # serves the built `dist` there, so the frontend must be built first.
      - name: Build frontend
        run: pnpm --filter @astro-plan/desktop build

      - name: Build desktop app (debug)
        run: cargo build -p desktop_shell

      - name: Real-UI WebdriverIO spike
        run: xvfb-run -a pnpm --filter @astro-plan/desktop test:e2e:wdio
