mcp_servers:
- codebase-memory-mcp
- context7
- mcp-package-version
- playwright
- repomix
- serena
- tauri
mcp_configs:
  codebase-memory-mcp:
    name: codebase-memory-mcp
    transport: stdio
    registry: false
    command: codebase-memory-mcp
  context7:
    name: context7
    transport: stdio
    args:
    - -y
    - '@upstash/context7-mcp'
    registry: false
    command: npx
  mcp-package-version:
    name: mcp-package-version
    transport: stdio
    args:
    - -y
    - mcp-package-version
    registry: false
    command: npx
  playwright:
    name: playwright
    transport: stdio
    args:
    - -y
    - '@playwright/mcp@latest'
    registry: false
    command: npx
  repomix:
    name: repomix
    transport: stdio
    args:
    - -y
    - repomix
    - --mcp
    registry: false
    command: npx
  serena:
    name: serena
    transport: stdio
    args:
    - -lc
    - ctx="${SERENA_MCP_CONTEXT:-}"; if [ -z "$ctx" ]; then parent="$(ps -o args=
      -p "$PPID" 2>/dev/null | tr "[:upper:]" "[:lower:]")"; case "$parent" in *claude*)
      ctx="claude-code" ;; *codex*) ctx="codex" ;; *) ctx="agent" ;; esac; fi; exec
      serena start-mcp-server --context "$ctx" --project-from-cwd
    registry: false
    command: bash
  tauri:
    name: tauri
    transport: stdio
    args:
    - -y
    - '@hypothesi/tauri-mcp-server'
    registry: false
    command: npx
lsp_servers:
- rust-analyzer
- typescript-language-server
lsp_configs:
  rust-analyzer:
    name: rust-analyzer
    command: rust-analyzer
    extensionToLanguage:
      .rs: rust
    transport: stdio
  typescript-language-server:
    name: typescript-language-server
    command: typescript-language-server
    args:
    - --stdio
    extensionToLanguage:
      .ts: typescript
      .tsx: typescriptreact
      .js: javascript
      .jsx: javascriptreact
      .mjs: javascript
      .cjs: javascript
    transport: stdio
