[files]
extend-exclude = [
    ".agents/",
    ".claude/agents/",
    ".claude/commands/",
    ".claude/skills/",
    ".codex/",
    ".specify/",
    "docs/design/canvas-wireframes-*",
    "CLAUDE.md",
    "AGENTS.md",
    "GEMINI.md",
    "*/CLAUDE.md",
    "*/AGENTS.md",
    # release-please generated; full of commit-hash substrings that read as
    # misspellings ("ede"/"caf" fragments of full SHAs)
    "CHANGELOG.md",
    # generated star-catalog seed data (Bayer designations trip the checker)
    "assets/seed/",
]

[default.extend-words]
# Rust specta builder method
typ = "typ"
# SER astrophotography video format
ser = "ser"
# abbreviation for strategy (variable names)
strat = "strat"
# RGBA PNG abbreviation context
PN = "PN"
# debayer abbreviation in fixtures
DBE = "DBE"
# optical train ID prefix
ot = "ot"
# legitimate hyphenated prefix split on '-' (mis-prioritized, mis-resolve)
mis = "mis"
# accepted spelling in a test description
unparseable = "unparseable"
# UI abbreviation for "designation" (targets alias kind label)
desig = "desig"
# Bayer designations / test IDs (gamma, omega, nu)
gam = "gam"
ome = "ome"
noo = "noo"
# haversine formula abbreviation in coords.rs comments
hav = "hav"
# variable name for b->a angular separation in symmetry tests
ba = "ba"
# intentional wording: "review-transitionable lifecycle state"
transitionable = "transitionable"
# comment prose pluralising SQL keywords ("UNIONs", "LIKEs")
UNIO = "UNIO"
LIK = "LIK"
Desig = "Desig"
