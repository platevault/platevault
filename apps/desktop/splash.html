  Handoff 07 splash window. "Observatory Dark" starfield + status treatment
  (Splash.dc.html "Starfield * + status" variant) — the warm-dark app
  palette, matching the app icon tile. Static HTML/CSS on purpose: this is
  its own Vite entry (see vite.config.ts) and its own Tauri window (see
  tauri.conf.json "splash"), never mounted inside the React app shell.

  The pv-wordmark <svg> between the pv-wordmark:generated markers is
  outlined Space Grotesk 700 paths, not live text — no font is bundled or
  loaded here, so the wordmark renders identically offline with zero font
  dependency. Regenerate via `pnpm wordmark:generate` (never hand-edit the
  path data); see scripts/generate-splash-wordmark.mjs.
-->

      }

          0 34px 70px -24px rgba(0, 0, 0, 0.72),

      }
      .pv-content {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        padding-bottom: 46px;
      }
      .pv-mark {
        position: relative;
        display: inline-flex;
        width: 158px;
        height: 158px;
      }
      .pv-mark .pv-frame {
        position: absolute;
        inset: 0;
        display: inline-flex;
        color: #f0ebe2;
      }
      .pv-mark .pv-constel {
        position: relative;
        display: inline-flex;
        color: #d98a3d;
      }
      .pv-status {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 0 40px 26px;
      }
      .pv-status-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
        color: #cfc7b8;
        margin-bottom: 9px;
      }
      .pv-status-row .pv-version {
        font-family: ui-monospace, monospace;
        color: #8f8676;
      }
      .pv-progress-track {
        height: 4px;
        border-radius: 3px;
        background: #2c281f;
        position: relative;
        overflow: hidden;
      }
      .pv-progress-indicator {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 34%;
        border-radius: 3px;
        background: #d98a3d;
        animation: pv-load 1.4s ease-in-out infinite;
      }
    </style>
