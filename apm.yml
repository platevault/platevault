name: astro-plan
version: 1.0.0
description: APM project for Astro Library Manager.
author: Sjors Robroek
dependencies:
  apm:
  - srobroek/agentic-packages/packages/core#^0.4.1
  - srobroek/agentic-packages/packages/resume-session#^0.2.1
  - srobroek/agentic-packages/packages/speckit#^0.1.2
  - srobroek/agentic-packages/packages/steering-speckit#^0.2.1
  - srobroek/agentic-packages/packages/speckit-dag-hooks#^0.3.2
  - srobroek/agentic-packages/packages/language-rust#^0.1.2
  - srobroek/agentic-packages/packages/language-typescript#^0.1.2
  - srobroek/agentic-packages/packages/frontend#^0.1.2
  - srobroek/agentic-packages/packages/rust-quality#^0.1.2
  - srobroek/agentic-packages/packages/typescript-quality#^0.1.2
  - srobroek/agentic-packages/packages/docs-architecture#^0.1.0
  - srobroek/agentic-packages/packages/mcp-playwright#^0.1.0
  - srobroek/agentic-packages/packages/mcp-codebase-memory#^0.1.0
  - srobroek/agentic-packages/packages/mcp-context7#^0.1.0
  - srobroek/agentic-packages/packages/mcp-package-version#^0.1.1
  - srobroek/agentic-packages/packages/mcp-repomix#^0.1.0
  - wshobson/agents/plugins/database-design#cc37bfdd292ce520ba1c44df7a3a70d5f8137236
  - srobroek/agentic-packages/packages/mcp-serena#^0.1.0
  - srobroek/agentic-packages/packages/mcp-tauri#^1.0.0
includes: auto
scripts:
  install-agentic-tools: apm install --target claude,codex,agent-skills --update
  prune-stale-local-packages: python3 apm_modules/srobroek/agentic-packages/packages/core/.apm/scripts/prune-stale-local-packages.py
  compile-agentic-tools: apm compile --target codex --no-constitution && apm compile
    --target claude --no-constitution
  strip-constitution-blocks: python3 apm_modules/srobroek/agentic-packages/packages/core/.apm/scripts/strip-constitution-blocks.py
  fix-agents-context-links: python3 apm_modules/srobroek/agentic-packages/packages/core/.apm/scripts/fix-agents-context-links.py
  write-claude-pointers: python3 apm_modules/srobroek/agentic-packages/packages/core/.apm/scripts/write-claude-pointers.py
  setup-agentic-tools: apm run install-agentic-tools && apm run prune-stale-local-packages
    && apm run compile-agentic-tools && apm run strip-constitution-blocks && apm run
    fix-agents-context-links
compilation:
  strategy: distributed
  source_attribution: false
  exclude:
  - apm_modules/_local/**
  placement:
    min_instructions_per_file: 1
