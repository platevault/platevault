name: astro-plan
version: 1.0.0
description: APM project for Astro Library Manager.
author: Sjors Robroek
dependencies:
  apm:
  - srobroek/agentic-packages/packages/core#>=8.0.0 <9.0.0
  - srobroek/agentic-packages/packages/steering-pragmatic#main
  - srobroek/agentic-packages/packages/orchestrate#main
  - srobroek/agentic-packages/packages/release-please#main
  - srobroek/agentic-packages/packages/speckit#main
  - srobroek/agentic-packages/packages/steering-speckit#main
  - srobroek/agentic-packages/packages/language-rust#main
  - srobroek/agentic-packages/packages/language-typescript#main
  - srobroek/agentic-packages/packages/language-shell#main
  - srobroek/agentic-packages/packages/frontend#>=4.0.0 <5.0.0
  - srobroek/agentic-packages/packages/docs-architecture#main
  - srobroek/agentic-packages/packages/steering-docs-specs#main
  - srobroek/agentic-packages/packages/steering-tools-scripts#main
  - srobroek/agentic-packages/packages/steering-infrastructure#main
  - srobroek/agentic-packages/packages/steering-data#main
  - srobroek/agentic-packages/packages/mcp-1mcp#>=1.0.0 <2.0.0
  - srobroek/agentic-packages/packages/mcp-tauri#>=2.0.0 <3.0.0
  - wshobson/agents/plugins/database-design
  - srobroek/agentic-packages/packages/user-journeys#main
includes: auto
targets:
  - claude
  - codex
scripts:
  install-agentic-tools: apm install --target claude,codex --update
  compile-agentic-tools: apm compile --target codex --no-constitution && apm compile
    --target claude --no-constitution
  setup-agentic-tools: apm run install-agentic-tools && apm run compile-agentic-tools
compilation:
  strategy: distributed
  source_attribution: false
  exclude:
  - apm_modules/_local/**
  placement:
    min_instructions_per_file: 1
