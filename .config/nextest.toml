# Nextest configuration for spec 037 Layer-2 real-UI E2E journeys.
#
# Run the E2E suite with:
#   cargo nextest run -p e2e_tests --profile e2e --run-ignored all
#
# (`--run-ignored all` because the journeys are `#[ignore]`d in-source so the
# Layer-1 `cargo test --workspace` job — no tauri-webdriver CLI, no
# e2e-feature app build, no served frontend — skips them.)
#
# The "e2e" profile runs a bounded number of journeys concurrently, a
# generous per-test timeout, one automatic retry, and immediate-final failure
# output so the first broken journey is visible without scrolling.
#
# Each journey (nextest test) is its own OS process with its own ephemeral
# tauri-webdriver ports, isolated app-data/config dirs, and its own SQLite
# file (`crates/e2e-tests/tests/common/mod.rs::InstanceEnv`) — concurrent
# journeys no longer race each other over shared :4444/:4445 ports or a
# shared DB file.
#
# `test-threads` was pinned at 1 despite that isolation because of a second,
# product-code collision: `tauri_plugin_single_instance::init()`
# (`apps/desktop/src-tauri/src/lib.rs`) registered a Linux D-Bus well-known
# name derived only from the app identifier + version — no per-process
# override. Two concurrent `desktop_shell` instances collided on that name;
# the loser was silently redirected to the winner and never opened its own
# window, so its WebDriver plugin server never came up (observed
# deterministically on ubuntu, CI runs 29593925067/29592400990 — the SAME
# journey slot failed `WebDriver session not created` on both nextest
# retries, at both a 120s and a 240s `LAUNCH_TIMEOUT`, while sibling
# journeys booted normally in the same run). Windows did not reproduce this
# in the same runs, but the harness makes no OS-specific claim either way.
#
# Fixed by parameterizing the single-instance D-Bus id: the harness sets
# `ALM_E2E_INSTANCE_ID` per test process (`crates/e2e-tests/tests/common/
# mod.rs::spawn_tauri_webdriver`), and `apps/desktop/src-tauri/src/lib.rs`
# threads it into `tauri_plugin_single_instance::Builder::dbus_id` when
# present — a no-op for real users/non-e2e builds, where the env var is
# never set and the plugin keeps its normal identifier-derived name.
#
# `test-threads = 2` (not higher): CI runners are 4-core, and each journey
# boots a debug-build WebKitGTK/WebView2 app + SQLite migrate + ~13k-row
# target-seed load (see `LAUNCH_TIMEOUT`'s docs) — 2 concurrent boots is the
# contention CI was already tuned for (the 240s `LAUNCH_TIMEOUT` bump in
# PR #951 assumed exactly this), and this fix's own verification run is the
# first real evidence for going further.

[profile.e2e]
test-threads = 2

# Warn every 60 s; terminate after 5 periods (300 s). Must exceed the
# harness's LAUNCH_TIMEOUT (240 s — slow/contended debug-build app boot on CI
# runners, see crates/e2e-tests/tests/common/mod.rs) plus in-journey polling.
slow-timeout = { period = "60s", terminate-after = 5 }

# Retry once to guard against transient driver/startup flakes.
retries = 1

# Run every journey even when one fails: with fail-fast (the default) a single
# failure cancels the remaining serial tests, hiding their results from CI
# (run 28694907445 reported "1/6 tests run" with no signal for the other 5).
fail-fast = false

# Print failures immediately and again at the end for easy scanning.
failure-output = "immediate-final"

# ---------------------------------------------------------------------------
# CI profile for the Layer-1 workspace test run (spec: build/adopt-nextest).
#
# Used by CI via `cargo nextest run --workspace --profile ci`. Local `just test`
# uses the built-in "default" profile (fail-fast on, no retries, no JUnit).
# ---------------------------------------------------------------------------
[profile.ci]
# Report every failing test in one run instead of stopping at the first, so a
# broken CI matrix leg shows the full failure set (matches the workspace
# `cargo test` behaviour this profile replaces, which ran all test binaries).
fail-fast = false

# Print failures immediately and again in a trailing summary for easy scanning
# of long CI logs.
failure-output = "immediate-final"

# Machine-readable results for CI test reporters. Written to
# `target/nextest/ci/junit.xml`.
[profile.ci.junit]
path = "junit.xml"

# Retry ONLY the real-SQLite integration-test binaries. These live in the
# `tests/` dirs (kind(test)) of the DB-touching crates and can flake under
# parallel SQLite file/pool access on loaded CI runners. Unit tests
# (kind(lib)) are deliberately NOT retried — a red unit test is a real failure
# and must not be masked by re-running.
[[profile.ci.overrides]]
filter = 'kind(test) & (package(persistence_db) | package(app_core) | package(targeting_resolver))'
retries = 2
