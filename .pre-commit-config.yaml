# apps/desktop/src/bindings/ is generated (tauri-specta); its doc comments
# carry trailing whitespace, so whitespace/EOF fixers would corrupt it and
# break the `just check-generated` drift gate.
exclude: '^(\.specify/|specs/|\.claude/|\.agents/|\.codex/|\.mcp\.json|apps/desktop/src/bindings/)'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: detect-private-key
      # Generated outputs (specta bindings, seed catalog) must keep their
      # generator-emitted bytes — CI's `just check-generated` drift gate
      # regenerates and `git diff --exit-code`s them, so whitespace "fixes"
      # here would fail CI. signatures/cla.json is written by the CLA
      # Assistant GitHub Action, not by humans; it ships without a trailing
      # newline, and the bot rewrites it without one on every signature, so
      # a locally-added newline would never stick — excluded rather than
      # "fixed" once.
      - id: end-of-file-fixer
        exclude: '^(apps/desktop/src/bindings/|assets/seed/|signatures/cla\.json)'
      - id: trailing-whitespace
        exclude: '^(apps/desktop/src/bindings/|assets/seed/)'

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks

  - repo: https://github.com/crate-ci/typos
    rev: v1.32.0
    hooks:
      - id: typos
        args: [--force-exclude]

  - repo: https://github.com/alexander-bauer/cocogitto-pre-commit
    rev: v0.1.0
    hooks:
      - id: cocogitto-verify
        stages: [commit-msg]

  # Catches a `var(--pv-*)` that resolves to nothing before it is committed.
  # That failure is invisible at review time — the browser silently drops the
  # declaration, so the rule is simply absent rather than visibly wrong — and it
  # reached production once already (spec 028, R-4).
  #
  # Runs the same glob as CI rather than the staged filenames: stylelint resolves
  # its config and referenceFiles relative to apps/desktop, so the repo-root
  # relative paths pre-commit would hand in do not resolve. Linting all CSS costs
  # about a second and keeps the local result identical to CI's.
  - repo: local
    hooks:
      - id: stylelint-token-references
        name: stylelint (design-token references)
        language: system
        pass_filenames: false
        files: ^(apps/desktop/src/styles/.*\.css|apps/desktop/tokens/.*|packages/tokens/.*)$
        entry: pnpm --dir apps/desktop exec stylelint "src/styles/**/*.css"
