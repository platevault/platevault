exclude: '^(\.specify/|specs/|\.claude/|\.agents/|\.codex/|\.mcp\.json)'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: detect-private-key
      # Generated outputs (specta bindings, seed catalog) must keep their
      # generator-emitted bytes — CI's `just check-generated` drift gate
      # regenerates and `git diff --exit-code`s them, so whitespace "fixes"
      # here would fail CI.
      - id: end-of-file-fixer
        exclude: '^(apps/desktop/src/bindings/|assets/seed/)'
      - id: trailing-whitespace
        exclude: '^(apps/desktop/src/bindings/|assets/seed/)'

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks

  - repo: https://github.com/crate-ci/typos
    rev: v1.32.0
    hooks:
      - id: typos
        args: [--force-exclude]

  - repo: https://github.com/alexander-bauer/cocogitto-pre-commit
    rev: v0.1.0
    hooks:
      - id: cocogitto-verify
        stages: [commit-msg]
