[workspace]
resolver = "2"
members = [
  "apps/desktop/src-tauri",
  "crates/app/core",
  "crates/audit",
  "crates/calibration/core",
  "crates/contracts/core",
  "crates/domain/core",
  "crates/fs/inventory",
  "crates/fs/planner",
  "crates/metadata/core",
  "crates/metadata/fits",
  "crates/metadata/video",
  "crates/metadata/xisf",
  "crates/persistence/db",
  "crates/project/structure",
  "crates/sessions",
  "crates/targeting",
  "crates/workflow/profiles",
  "tests/contract",
]

[workspace.package]
edition = "2021"
license = "Apache-2.0"
repository = ""

[workspace.dependencies]
quick-xml = "0.39"
# Ratified stack (spec 002 2026-05-23):
#   sqlx = { version = "0.8", default-features = false, features = ["sqlite", "runtime-tokio-rustls", "macros", "migrate", "uuid", "time", "json"] }
#   specta = { version = "2", features = ["derive", "uuid", "time"] }
#   specta-typescript = "0.0.9"
#   tauri-specta = { version = "2", features = ["typescript"] }
# Commented out because they are not in the local cargo cache and crates.io is
# unreachable in the CI sandbox. Wire these lines (uncomment) when building with
# network access so cargo can download and cache them.
schemars = { version = "0.8", features = ["uuid1"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
time = { version = "0.3", features = ["formatting", "parsing", "serde"] }
tokio = { version = "1", features = ["sync", "rt-multi-thread", "macros", "fs"] }
uuid = { version = "1", features = ["serde", "v4"] }

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
all = "warn"
pedantic = "warn"
