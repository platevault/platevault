[workspace]
resolver = "2"
members = [
  "apps/desktop/src-tauri",
  "crates/app/core",
  "crates/audit",
  "crates/calibration/core",
  "crates/contracts/core",
  "crates/domain/core",
  "crates/fs/inventory",
  "crates/fs/planner",
  "crates/metadata/core",
  "crates/metadata/fits",
  "crates/metadata/video",
  "crates/metadata/xisf",
  "crates/persistence/db",
  "crates/project/structure",
  "crates/sessions",
  "crates/targeting",
  "crates/workflow/profiles",
  "tests/contract",
]

[workspace.package]
edition = "2021"
license = "Apache-2.0"
repository = ""

[workspace.dependencies]
quick-xml = "0.39"
rusqlite = { version = "0.37", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
time = { version = "0.3", features = ["formatting", "parsing", "serde"] }
uuid = { version = "1", features = ["serde", "v4"] }

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
all = "warn"
pedantic = "warn"
