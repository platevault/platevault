[mcp_servers.1mcp]
command = "bash"
args = ["-lc", "launcher_rel=\"apm_modules/srobroek/agentic-packages/packages/mcp-1mcp/scripts/launcher.sh\"; for apm_root in \"${APM_HOME:-}\" \"${HOME}/.apm\" \"$PWD/.apm\"; do [ -n \"$apm_root\" ] || continue; launcher=\"$apm_root/$launcher_rel\"; [ -r \"$launcher\" ] && exec bash \"$launcher\"; done; echo 1mcp-apm-launcher-not-found-run-apm-install >&2; exit 1"]
id = ""

[mcp_servers.1mcp.env]

[mcp_servers.tauri]
command = "npx"
args = ["-y", "@hypothesi/tauri-mcp-server"]
id = ""

[mcp_servers.tauri.env]
[features]
hooks = true
