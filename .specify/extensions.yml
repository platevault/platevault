installed:
- agent-assign
- git
- memory-md
settings:
  auto_execute_hooks: true
hooks:
  after_init:
  - extension: brownfield
    command: speckit.brownfield.scan
    enabled: true
    optional: true
    prompt: Scan this existing project to customize spec-kit configuration?
    description: Auto-scan project after spec-kit init to detect tech stack and conventions
    condition: null
  after_implement:
  - extension: bugfix
    command: speckit.bugfix.verify
    enabled: true
    optional: true
    prompt: Run bugfix consistency check after implementation?
    description: Verify spec artifact consistency after implementation completes
    condition: null
  - extension: cleanup
    command: speckit.cleanup.run
    enabled: true
    optional: true
    prompt: Run cleanup to review implementation changes and identify tech debt?
    description: Post-implementation quality gate
    condition: null
  - extension: fix-findings
    command: speckit.fix-findings.run
    enabled: true
    optional: true
    prompt: Run fix-findings to analyze and resolve spec findings automatically?
    description: Post-implementation automated finding resolution
    condition: null
  - extension: onboard
    command: speckit.onboard.after-implement
    enabled: true
    optional: true
    prompt: Execute speckit.onboard.after-implement?
    description: ''
    condition: null
  - extension: qa
    command: speckit.qa.run
    enabled: true
    optional: true
    prompt: Run QA testing?
    description: Validates acceptance criteria through browser-driven or CLI-based
      testing
    condition: null
  - extension: review
    command: speckit.review.run
    enabled: true
    optional: true
    prompt: Run PR review on implemented changes?
    description: Comprehensive review after implementation
    condition: null
  - extension: verify
    command: speckit.verify.run
    enabled: true
    optional: true
    prompt: Run verify to validate implementation against specification?
    description: Post-implementation verification gate
    condition: null
  - extension: verify-tasks
    command: speckit.verify-tasks.run
    enabled: true
    optional: true
    prompt: Run verify-tasks in a fresh session to check for phantom completions
    description: Post-implementation phantom completion detector
    condition: null
  - extension: memory-md
    command: speckit.memory-md.capture-from-diff
    enabled: true
    optional: true
    prompt: Would you like to capture durable lessons from this implementation to
      project memory?
    description: ''
    condition: null
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit implementation changes?
    description: Auto-commit after implementation
    condition: null
  after_plan:
  - extension: critique
    command: speckit.critique.run
    enabled: true
    optional: true
    prompt: Run spec critique before proceeding to tasks?
    description: Challenges the spec and plan through product and engineering lenses
    condition: null
  - extension: refine
    command: speckit.refine.status
    enabled: true
    optional: true
    prompt: Check artifact sync status after planning?
    description: Show sync status after plan generation
    condition: null
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit plan changes?
    description: Auto-commit after implementation planning
    condition: null
  after_tasks:
  - extension: diagram
    command: speckit.diagram.dependencies
    enabled: true
    optional: true
    prompt: Generate task dependency diagram after task breakdown?
    description: Auto-generate dependency DAG after tasks are created
    condition: null
  - extension: fleet
    command: speckit.fleet.review
    enabled: true
    optional: true
    prompt: Run cross-model review to evaluate plan and tasks before implementation?
    description: Pre-implementation review gate
    condition: null
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit task changes?
    description: Auto-commit after task generation
    condition: null
  - extension: agent-assign
    command: speckit.agent-assign.assign
    enabled: true
    optional: true
    prompt: Assign agents to the generated tasks?
    description: Automatically assign specialized agents to tasks after generation
    condition: null
  before_implement:
  - extension: onboard
    command: speckit.onboard.before-implement
    enabled: true
    optional: true
    prompt: Execute speckit.onboard.before-implement?
    description: ''
    condition: null
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before implementation?
    description: Auto-commit before implementation
    condition: null
  after_explain:
  - extension: onboard
    command: speckit.onboard.after-explain
    enabled: true
    optional: true
    prompt: Execute speckit.onboard.after-explain?
    description: ''
    condition: null
  after_specify:
  - extension: refine
    command: speckit.refine.status
    enabled: true
    optional: true
    prompt: Check artifact sync status after specification?
    description: Show sync status after spec generation
    condition: null
  - extension: worktree
    command: speckit.worktree.create
    enabled: true
    optional: true
    prompt: Create an isolated worktree for this new feature?
    description: Auto-spawn a worktree after a new feature is specified
    condition: null
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit specification changes?
    description: Auto-commit after specification
    condition: null
  before_specify:
  - extension: tinyspec
    command: speckit.tinyspec.classify
    enabled: true
    optional: true
    prompt: Check if this task is small enough for the lightweight tinyspec workflow?
    description: Auto-classify task complexity before starting the full SDD workflow
    condition: null
  - extension: git
    command: speckit.git.feature
    enabled: true
    optional: false
    prompt: Execute speckit.git.feature?
    description: Create feature branch before specification
    condition: null
  before_plan:
  - extension: memory-md
    command: speckit.memory-md.plan-with-memory
    enabled: true
    optional: true
    prompt: Would you like to synthesize project memory before planning?
    description: ''
    condition: null
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before planning?
    description: Auto-commit before implementation planning
    condition: null
  before_constitution:
  - extension: git
    command: speckit.git.initialize
    enabled: true
    optional: false
    prompt: Execute speckit.git.initialize?
    description: Initialize Git repository before constitution setup
    condition: null
  before_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before clarification?
    description: Auto-commit before spec clarification
    condition: null
  before_tasks:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before task generation?
    description: Auto-commit before task generation
    condition: null
  before_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before checklist?
    description: Auto-commit before checklist generation
    condition: null
  before_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before analysis?
    description: Auto-commit before analysis
    condition: null
  before_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before issue sync?
    description: Auto-commit before tasks-to-issues conversion
    condition: null
  after_constitution:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit constitution changes?
    description: Auto-commit after constitution update
    condition: null
  after_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit clarification changes?
    description: Auto-commit after spec clarification
    condition: null
  after_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit checklist changes?
    description: Auto-commit after checklist generation
    condition: null
  after_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit analysis results?
    description: Auto-commit after analysis
    condition: null
  after_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit after syncing issues?
    description: Auto-commit after tasks-to-issues conversion
    condition: null
